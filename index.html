<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo管理（カレンダー搭載）</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo",
          sans-serif;
        background: #f5f7fa;
        min-height: 100vh;
        color: #1e293b;
        padding: 24px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        font-size: 1.9em;
        margin-bottom: 12px;
        color: #1e293b;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .btn {
        padding: 11px 22px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        transition: all 0.2s ease;
      }

      .btn-primary {
        background: #4f46e5;
        color: #fff;
        box-shadow: 0 1px 3px rgba(79, 70, 229, 0.3);
      }

      .btn-primary:hover {
        background: #4338ca;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
      }

      .btn-secondary,
      .btn-export {
        background: #fff;
        color: #475569;
        border: 1px solid #d6dae3;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      }

      .btn-secondary:hover,
      .btn-export:hover {
        background: #f1f5f9;
        transform: translateY(-1px);
      }

      .input-section {
        background: #fff;
        border: 1px solid #e4e8f0;
        border-radius: 14px;
        padding: 25px;
        margin-bottom: 30px;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      }

      .input-group {
        margin-bottom: 15px;
      }

      .input-group label {
        display: block;
        margin-bottom: 8px;
        color: #475569;
        font-weight: 600;
        font-size: 0.9em;
      }

      .input-group input,
      .input-group textarea {
        width: 100%;
        padding: 11px 14px;
        border: 1px solid #d6dae3;
        border-radius: 9px;
        background: #fff;
        color: #1e293b;
        font-size: 16px; /* 16px未満だとiPhoneで入力時に画面が自動ズームされてしまうため */
        font-family: inherit;
        transition: all 0.2s ease;
        color-scheme: light; /* 日付選択カレンダーを明るいテーマで表示する */
      }

      .input-group input:focus,
      .input-group textarea:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
      }

      .input-group textarea {
        resize: vertical;
        min-height: 80px;
      }

      .task-sections {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
      }

      @media (max-width: 900px) {
        .task-sections {
          grid-template-columns: 1fr;
        }
      }

      .task-column {
        background: #fff;
        border-radius: 14px;
        padding: 20px;
        border: 1px solid #e4e8f0;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      }

      .task-column h2 {
        text-align: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 3px solid;
        font-size: 1.05em;
      }

      .active-column h2 {
        color: #4f46e5;
        border-color: #4f46e5;
      }

      .pending-column h2 {
        color: #d97706;
        border-color: #f59e0b;
      }

      .completed-column h2 {
        color: #059669;
        border-color: #10b981;
      }

      .task-list {
        min-height: 200px;
      }

      .task-item {
        background: #fff;
        border: 1px solid #e4e8f0;
        border-radius: 10px;
        padding: 15px 15px 15px 18px;
        margin-bottom: 12px;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
        cursor: grab;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
      }

      .task-item:active {
        cursor: grabbing;
      }

      .task-item.dragging {
        opacity: 0.5;
        transform: scale(1.02);
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.15);
      }

      .task-item.drag-over {
        border-top: 3px solid #4f46e5;
        margin-top: 12px;
      }

      .task-item::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: #4f46e5;
      }

      .task-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.1);
      }

      .task-item.pending::before {
        background: #f59e0b;
      }

      .task-item.completed {
        opacity: 0.75;
        background: #f8fafc;
      }

      .task-item.completed::before {
        background: #10b981;
      }

      .task-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .drag-handle {
        color: #cbd5e1;
        font-size: 14px;
        cursor: grab;
      }

      .drag-handle:active {
        cursor: grabbing;
      }

      .task-title {
        font-size: 1.05em;
        font-weight: 600;
        color: #1e293b;
        word-break: break-word;
        flex: 1;
      }

      .task-item.completed .task-title {
        color: #64748b;
        text-decoration: line-through;
      }

      .task-content {
        color: #64748b;
        font-size: 0.95em;
        line-height: 1.5;
        margin-bottom: 12px;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .task-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .task-btn {
        padding: 6px 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
        font-family: inherit;
        transition: all 0.2s ease;
      }

      .task-btn-to-active {
        background: #eef2ff;
        color: #4f46e5;
      }

      .task-btn-to-active:hover {
        background: #e0e7ff;
      }

      .task-btn-to-pending {
        background: #fef3c7;
        color: #b45309;
      }

      .task-btn-to-pending:hover {
        background: #fde68a;
      }

      .task-btn-to-completed {
        background: #d1fae5;
        color: #047857;
      }

      .task-btn-to-completed:hover {
        background: #a7f3d0;
      }

      .task-btn-edit {
        background: #f1f5f9;
        color: #475569;
      }

      .task-btn-edit:hover {
        background: #e2e8f0;
      }

      .task-btn-delete {
        background: #fee2e2;
        color: #dc2626;
      }

      .task-btn-delete:hover {
        background: #fecaca;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: #fff;
        border: 1px solid #e4e8f0;
        border-radius: 16px;
        padding: 30px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.25);
      }

      .modal-content h3 {
        color: #1e293b;
        margin-bottom: 20px;
        text-align: center;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
      }

      .hidden-input {
        display: none;
      }

      .empty-message {
        text-align: center;
        color: #94a3b8;
        padding: 40px;
        font-style: italic;
      }

      /* タイトル下のアクセントライン */
      .glow-line {
        height: 4px;
        width: 90px;
        margin: 0 auto 25px;
        border-radius: 2px;
        background: linear-gradient(90deg, #4f46e5, #8b5cf6);
      }

      .task-count {
        text-align: center;
        font-size: 0.85em;
        color: #94a3b8;
        margin-top: -15px;
        margin-bottom: 15px;
      }

      /* ===== 期限バッジ（タスクカード上の期限表示） ===== */
      .due-date {
        display: inline-block;
        font-size: 0.8em;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 12px;
        margin-bottom: 10px;
        color: #4f46e5;
        background: #eef2ff;
      }

      .due-date.overdue {
        color: #dc2626;
        background: #fee2e2;
      }

      .due-date.due-today {
        color: #b45309;
        background: #fef3c7;
      }

      /* ===== カレンダーセクション ===== */
      .calendar-section {
        background: #fff;
        border: 1px solid #e4e8f0;
        border-radius: 14px;
        padding: 25px;
        margin-top: 30px;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      }

      .calendar-header {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .calendar-title {
        color: #1e293b;
        font-size: 1.3em;
        font-weight: 700;
        min-width: 170px;
        text-align: center;
      }

      .cal-nav-btn {
        background: #fff;
        border: 1px solid #d6dae3;
        color: #475569;
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;
        font-size: 14px;
        font-family: inherit;
        transition: all 0.2s ease;
      }

      .cal-nav-btn:hover {
        background: #f1f5f9;
        transform: translateY(-1px);
      }

      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
      }

      .calendar-weekday {
        text-align: center;
        color: #94a3b8;
        font-size: 0.85em;
        font-weight: bold;
        padding: 6px 0;
      }

      .calendar-weekday.sunday {
        color: #dc2626;
      }
      .calendar-weekday.saturday {
        color: #2563eb;
      }

      .calendar-day {
        min-height: 90px;
        border: 1px solid #eef1f6;
        border-radius: 8px;
        padding: 5px;
        background: #f8fafc;
        font-size: 0.8em;
        overflow: hidden;
      }

      .calendar-day.other-month {
        background: transparent;
        border-color: transparent;
      }

      .calendar-day.today-cell {
        border-color: #4f46e5;
        background: #eef2ff;
      }

      .day-number {
        color: #64748b;
        font-size: 0.95em;
        margin-bottom: 4px;
      }

      .calendar-day.sunday .day-number {
        color: #dc2626;
      }
      .calendar-day.saturday .day-number {
        color: #2563eb;
      }
      .calendar-day.today-cell .day-number {
        color: #4f46e5;
        font-weight: bold;
      }

      .cal-task {
        display: block;
        padding: 2px 6px;
        margin-bottom: 3px;
        border-radius: 4px;
        background: #e0e7ff;
        color: #3730a3;
        cursor: pointer;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border-left: 3px solid #4f46e5;
        transition: all 0.2s ease;
      }

      .cal-task:hover {
        background: #c7d2fe;
      }

      .cal-task.pending {
        background: #fef3c7;
        color: #92400e;
        border-left-color: #f59e0b;
      }

      .cal-task.completed {
        background: #d1fae5;
        color: #047857;
        border-left-color: #10b981;
        text-decoration: line-through;
        opacity: 0.7;
      }

      .cal-task.overdue {
        border-left-color: #dc2626;
        background: #fee2e2;
        color: #b91c1c;
      }

      /* ===== タブレットサイズ（900px以下）の調整 ===== */
      @media (max-width: 900px) {
        .calendar-day {
          min-height: 60px;
          font-size: 0.7em;
        }
      }

      /* ===== スマホサイズ（600px以下）の調整 ===== */
      @media (max-width: 600px) {
        body {
          padding: 12px;
        }

        h1 {
          font-size: 1.4em;
        }

        .controls {
          gap: 8px;
        }

        .btn {
          padding: 10px 16px;
          font-size: 13px;
        }

        .input-section,
        .task-column,
        .calendar-section {
          padding: 15px;
          border-radius: 12px;
        }

        .task-sections {
          gap: 14px;
        }

        /* カレンダーをスマホの画面幅に収める */
        .calendar-header {
          gap: 8px;
        }

        .calendar-title {
          font-size: 1.1em;
          min-width: 130px;
        }

        .cal-nav-btn {
          padding: 7px 10px;
          font-size: 12px;
        }

        .calendar-grid {
          gap: 3px;
        }

        .calendar-day {
          min-height: 52px;
          padding: 3px;
          border-radius: 6px;
        }

        .day-number {
          margin-bottom: 2px;
        }

        .cal-task {
          padding: 1px 3px;
          border-left-width: 2px;
          margin-bottom: 2px;
        }

        .modal-content {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>ToDo管理（カレンダー搭載）</h1>

      <div class="glow-line"></div>

      <div class="controls">
        <button
          class="btn btn-secondary"
          onclick="document.getElementById('importFile').click()"
        >
          📥 データを復元
        </button>
        <input
          type="file"
          id="importFile"
          class="hidden-input"
          accept=".json"
          onchange="importTasks(event)"
        />
        <button class="btn btn-export" onclick="exportTasks()">
          📤 データをバックアップ
        </button>
      </div>

      <div class="input-section">
        <div class="input-group">
          <label>タイトル</label>
          <input
            type="text"
            id="taskTitle"
            placeholder="タスクのタイトルを入力..."
          />
        </div>
        <div class="input-group">
          <label>内容</label>
          <textarea
            id="taskContent"
            placeholder="タスクの詳細内容を入力..."
          ></textarea>
        </div>
        <div class="input-group">
          <label>期限（任意）</label>
          <input type="date" id="taskDueDate" />
        </div>
        <div style="text-align: center; margin-top: 15px">
          <button class="btn btn-primary" onclick="addTask()">
            ✨ タスクを追加
          </button>
        </div>
      </div>

      <div class="task-sections">
        <div class="task-column active-column">
          <h2>📋 未完了タスク</h2>
          <div class="task-count" id="activeCount"></div>
          <div class="task-list" id="activeTaskList" data-status="active"></div>
        </div>
        <div class="task-column pending-column">
          <h2>⏳ 相手が確認中</h2>
          <div class="task-count" id="pendingCount"></div>
          <div
            class="task-list"
            id="pendingTaskList"
            data-status="pending"
          ></div>
        </div>
        <div class="task-column completed-column">
          <h2>✅ 済</h2>
          <div class="task-count" id="completedCount"></div>
          <div
            class="task-list"
            id="completedTaskList"
            data-status="completed"
          ></div>
        </div>
      </div>

      <!-- 期限カレンダー：期限を設定したタスクが該当日に表示される -->
      <div class="calendar-section">
        <div class="calendar-header">
          <button class="cal-nav-btn" onclick="moveCalendar(-1)">◀ 前月</button>
          <div class="calendar-title" id="calendarTitle"></div>
          <button class="cal-nav-btn" onclick="moveCalendar(1)">次月 ▶</button>
          <button class="cal-nav-btn" onclick="moveCalendarToToday()">
            今月へ
          </button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
    </div>

    <div class="modal" id="editModal">
      <div class="modal-content">
        <h3>📝 タスクを編集</h3>
        <input type="hidden" id="editTaskId" />
        <div class="input-group">
          <label>タイトル</label>
          <input type="text" id="editTaskTitle" />
        </div>
        <div class="input-group">
          <label>内容</label>
          <textarea id="editTaskContent"></textarea>
        </div>
        <div class="input-group">
          <label>期限（任意）</label>
          <input type="date" id="editTaskDueDate" />
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary" onclick="saveEdit()">保存</button>
          <button class="btn btn-secondary" onclick="closeModal()">
            キャンセル
          </button>
        </div>
      </div>
    </div>

    <script>
      let tasks = [];
      let taskIdCounter = 1;
      let draggedItem = null;
      let draggedTaskId = null;

      const STATUS = {
        ACTIVE: "active",
        PENDING: "pending",
        COMPLETED: "completed",
      };

      window.onload = function () {
        const savedTasks = localStorage.getItem("nexusTasks");
        const savedCounter = localStorage.getItem("nexusTaskCounter");
        if (savedTasks) {
          tasks = JSON.parse(savedTasks);
          tasks = tasks.map((task) => {
            if (!task.status) {
              task.status = task.completed ? STATUS.COMPLETED : STATUS.ACTIVE;
            }
            if (task.order === undefined) {
              task.order = task.id;
            }
            return task;
          });
        }
        if (savedCounter) {
          taskIdCounter = parseInt(savedCounter);
        }
        renderTasks();
      };

      function saveTasks() {
        localStorage.setItem("nexusTasks", JSON.stringify(tasks));
        localStorage.setItem("nexusTaskCounter", taskIdCounter.toString());
      }

      function addTask() {
        const title = document.getElementById("taskTitle").value.trim();
        const content = document.getElementById("taskContent").value.trim();
        const dueDate = document.getElementById("taskDueDate").value; // 未入力なら空文字

        if (!title) {
          alert("タイトルを入力してください");
          return;
        }

        const task = {
          id: taskIdCounter++,
          title: title,
          content: content,
          dueDate: dueDate || null, // 期限は任意。未設定なら null
          status: STATUS.ACTIVE,
          order: Date.now(),
          createdAt: new Date().toISOString(),
        };

        tasks.push(task);
        saveTasks();
        renderTasks();

        document.getElementById("taskTitle").value = "";
        document.getElementById("taskContent").value = "";
        document.getElementById("taskDueDate").value = "";
      }

      function changeStatus(id, newStatus) {
        const task = tasks.find((t) => t.id === id);
        if (task) {
          task.status = newStatus;
          task.order = Date.now();
          saveTasks();
          renderTasks();
        }
      }

      function deleteTask(id) {
        if (confirm("このタスクを削除しますか？")) {
          tasks = tasks.filter((t) => t.id !== id);
          saveTasks();
          renderTasks();
        }
      }

      function openEditModal(id) {
        const task = tasks.find((t) => t.id === id);
        if (task) {
          document.getElementById("editTaskId").value = id;
          document.getElementById("editTaskTitle").value = task.title;
          document.getElementById("editTaskContent").value = task.content;
          document.getElementById("editTaskDueDate").value = task.dueDate || "";
          document.getElementById("editModal").classList.add("active");
        }
      }

      function saveEdit() {
        const id = parseInt(document.getElementById("editTaskId").value);
        const title = document.getElementById("editTaskTitle").value.trim();
        const content = document.getElementById("editTaskContent").value.trim();

        if (!title) {
          alert("タイトルを入力してください");
          return;
        }

        const task = tasks.find((t) => t.id === id);
        if (task) {
          task.title = title;
          task.content = content;
          task.dueDate =
            document.getElementById("editTaskDueDate").value || null;
          saveTasks();
          renderTasks();
          closeModal();
        }
      }

      function closeModal() {
        document.getElementById("editModal").classList.remove("active");
      }

      function exportTasks() {
        const dataStr = JSON.stringify(tasks, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download =
          "todo_backup_" + new Date().toISOString().slice(0, 10) + ".json";
        a.click();
        URL.revokeObjectURL(url);
      }

      function importTasks(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            let importedTasks = JSON.parse(e.target.result);
            if (Array.isArray(importedTasks)) {
              importedTasks = importedTasks.map((task) => {
                if (!task.status) {
                  task.status = task.completed
                    ? STATUS.COMPLETED
                    : STATUS.ACTIVE;
                }
                if (task.order === undefined) {
                  task.order = task.id;
                }
                return task;
              });

              if (
                confirm(
                  "現在のタスクに追加しますか？\n「OK」= 追加 / 「キャンセル」= 置き換え"
                )
              ) {
                tasks = tasks.concat(importedTasks);
              } else {
                tasks = importedTasks;
              }
              const maxId = Math.max(...tasks.map((t) => t.id || 0), 0);
              taskIdCounter = maxId + 1;
              saveTasks();
              renderTasks();
              alert("データの復元が完了しました！");
            } else {
              alert("無効なファイル形式です");
            }
          } catch (error) {
            alert("ファイルの読み込みに失敗しました");
          }
        };
        reader.readAsText(file);
        event.target.value = "";
      }

      function handleDragStart(e, taskId) {
        draggedTaskId = taskId;
        draggedItem = e.target.closest(".task-item");
        draggedItem.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", taskId);
      }

      function handleDragEnd(e) {
        if (draggedItem) {
          draggedItem.classList.remove("dragging");
        }
        document.querySelectorAll(".task-item").forEach((item) => {
          item.classList.remove("drag-over");
        });
        draggedItem = null;
        draggedTaskId = null;
      }

      function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";

        const taskItem = e.target.closest(".task-item");
        if (taskItem && taskItem !== draggedItem) {
          document.querySelectorAll(".task-item").forEach((item) => {
            item.classList.remove("drag-over");
          });
          taskItem.classList.add("drag-over");
        }
      }

      function handleDrop(e, targetTaskId, status) {
        e.preventDefault();

        if (draggedTaskId === null || draggedTaskId === targetTaskId) {
          return;
        }

        const draggedTask = tasks.find((t) => t.id === draggedTaskId);
        const targetTask = tasks.find((t) => t.id === targetTaskId);

        if (!draggedTask || !targetTask) return;
        if (draggedTask.status !== targetTask.status) return;

        const statusTasks = tasks
          .filter((t) => t.status === status)
          .sort((a, b) => a.order - b.order);

        const draggedIndex = statusTasks.findIndex(
          (t) => t.id === draggedTaskId
        );
        const targetIndex = statusTasks.findIndex((t) => t.id === targetTaskId);

        statusTasks.splice(draggedIndex, 1);
        statusTasks.splice(targetIndex, 0, draggedTask);

        statusTasks.forEach((task, index) => {
          task.order = index;
        });

        saveTasks();
        renderTasks();
      }

      function setupDragEvents() {
        document.querySelectorAll(".task-item").forEach((item) => {
          item.addEventListener("dragstart", (e) => {
            const taskId = parseInt(item.dataset.taskId);
            handleDragStart(e, taskId);
          });
          item.addEventListener("dragend", handleDragEnd);
          item.addEventListener("dragover", handleDragOver);
          item.addEventListener("drop", (e) => {
            const taskId = parseInt(item.dataset.taskId);
            const status = item.dataset.status;
            handleDrop(e, taskId, status);
          });
        });
      }

      function renderTasks() {
        const activeList = document.getElementById("activeTaskList");
        const pendingList = document.getElementById("pendingTaskList");
        const completedList = document.getElementById("completedTaskList");

        const activeTasks = tasks
          .filter((t) => t.status === STATUS.ACTIVE)
          .sort(compareTasks);
        const pendingTasks = tasks
          .filter((t) => t.status === STATUS.PENDING)
          .sort(compareTasks);
        const completedTasks = tasks
          .filter((t) => t.status === STATUS.COMPLETED)
          .sort(compareTasks);

        document.getElementById(
          "activeCount"
        ).textContent = `${activeTasks.length} 件`;
        document.getElementById(
          "pendingCount"
        ).textContent = `${pendingTasks.length} 件`;
        document.getElementById(
          "completedCount"
        ).textContent = `${completedTasks.length} 件`;

        activeList.innerHTML =
          activeTasks.length === 0
            ? '<div class="empty-message">タスクがありません</div>'
            : activeTasks.map((task) => createTaskHTML(task)).join("");

        pendingList.innerHTML =
          pendingTasks.length === 0
            ? '<div class="empty-message">確認中のタスクはありません</div>'
            : pendingTasks.map((task) => createTaskHTML(task)).join("");

        completedList.innerHTML =
          completedTasks.length === 0
            ? '<div class="empty-message">完了したタスクはありません</div>'
            : completedTasks.map((task) => createTaskHTML(task)).join("");

        setupDragEvents();
        renderCalendar(); // タスクが変わるたびにカレンダーも描き直す
      }

      // ===== タスクの並び順ルール =====
      // 1. 期限ありのタスクが上位（期限が早い順 ＝ 期限切れが最上位）
      // 2. 同じ期限同士、および期限なし同士は、これまで通りの並び順（order）
      // 3. 期限なしのタスクは期限ありの下に表示
      function compareTasks(a, b) {
        if (a.dueDate && b.dueDate) {
          if (a.dueDate !== b.dueDate) {
            return a.dueDate < b.dueDate ? -1 : 1;
          }
          return a.order - b.order;
        }
        if (a.dueDate) return -1;
        if (b.dueDate) return 1;
        return a.order - b.order;
      }

      // ===== 期限まわりの便利関数 =====

      // 今日の日付を "YYYY-MM-DD" 形式で返す
      function todayStr() {
        const d = new Date();
        return (
          d.getFullYear() +
          "-" +
          String(d.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(d.getDate()).padStart(2, "0")
        );
      }

      // 期限の状態を判定（期限切れ / 今日が期限 / それ以外）。完了済みタスクは警告しない
      function getDueClass(task) {
        if (task.status === STATUS.COMPLETED) return "";
        const today = todayStr();
        if (task.dueDate < today) return "overdue";
        if (task.dueDate === today) return "due-today";
        return "";
      }

      // "2026-06-15" → "2026/6/15(月)" のような日本語表記に変換
      function formatDateJP(dateStr) {
        const [y, m, d] = dateStr.split("-").map(Number);
        const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
        const w = weekdays[new Date(y, m - 1, d).getDay()];
        return `${y}/${m}/${d}(${w})`;
      }

      // ===== カレンダー機能 =====

      // 現在表示している年・月（初期値は今月）
      let calendarYear = new Date().getFullYear();
      let calendarMonth = new Date().getMonth(); // 0〜11

      // 前月・次月へ移動（delta = -1 または 1）
      function moveCalendar(delta) {
        calendarMonth += delta;
        if (calendarMonth < 0) {
          calendarMonth = 11;
          calendarYear--;
        }
        if (calendarMonth > 11) {
          calendarMonth = 0;
          calendarYear++;
        }
        renderCalendar();
      }

      function moveCalendarToToday() {
        calendarYear = new Date().getFullYear();
        calendarMonth = new Date().getMonth();
        renderCalendar();
      }

      function renderCalendar() {
        document.getElementById(
          "calendarTitle"
        ).textContent = `${calendarYear}年 ${calendarMonth + 1}月`;

        const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
        let html = weekdays
          .map((w, i) => {
            const cls = i === 0 ? " sunday" : i === 6 ? " saturday" : "";
            return `<div class="calendar-weekday${cls}">${w}</div>`;
          })
          .join("");

        const firstDay = new Date(calendarYear, calendarMonth, 1).getDay(); // 月初の曜日
        const daysInMonth = new Date(
          calendarYear,
          calendarMonth + 1,
          0
        ).getDate(); // 月の日数
        const today = todayStr();

        // 月初より前の空白マス
        for (let i = 0; i < firstDay; i++) {
          html += '<div class="calendar-day other-month"></div>';
        }

        // 1日〜月末のマスを作成
        for (let day = 1; day <= daysInMonth; day++) {
          const dateStr =
            calendarYear +
            "-" +
            String(calendarMonth + 1).padStart(2, "0") +
            "-" +
            String(day).padStart(2, "0");
          const dow = (firstDay + day - 1) % 7; // この日の曜日

          let cls = "calendar-day";
          if (dow === 0) cls += " sunday";
          if (dow === 6) cls += " saturday";
          if (dateStr === today) cls += " today-cell";

          // この日が期限のタスクを集める（クリックで編集画面が開く）
          const dayTasks = tasks
            .filter((t) => t.dueDate === dateStr)
            .sort((a, b) => a.order - b.order);
          const taskHTML = dayTasks
            .map((t) => {
              let taskCls = "cal-task";
              if (t.status === STATUS.PENDING) taskCls += " pending";
              if (t.status === STATUS.COMPLETED) taskCls += " completed";
              if (getDueClass(t) === "overdue") taskCls += " overdue";
              return `<span class="${taskCls}" title="${escapeHtml(
                t.title
              )}" onclick="openEditModal(${t.id})">${escapeHtml(
                t.title
              )}</span>`;
            })
            .join("");

          html += `<div class="${cls}"><div class="day-number">${day}</div>${taskHTML}</div>`;
        }

        document.getElementById("calendarGrid").innerHTML = html;
      }

      function createTaskHTML(task) {
        const escapedTitle = escapeHtml(task.title);
        const escapedContent = escapeHtml(task.content);

        let statusClass = "";
        let moveButtons = "";

        if (task.status === STATUS.ACTIVE) {
          statusClass = "";
          moveButtons = `
          <button class="task-btn task-btn-to-pending" onclick="changeStatus(${task.id}, '${STATUS.PENDING}')">⏳ 確認中へ</button>
          <button class="task-btn task-btn-to-completed" onclick="changeStatus(${task.id}, '${STATUS.COMPLETED}')">✅ 済へ</button>
        `;
        } else if (task.status === STATUS.PENDING) {
          statusClass = "pending";
          moveButtons = `
          <button class="task-btn task-btn-to-active" onclick="changeStatus(${task.id}, '${STATUS.ACTIVE}')">📋 未完了へ</button>
          <button class="task-btn task-btn-to-completed" onclick="changeStatus(${task.id}, '${STATUS.COMPLETED}')">✅ 済へ</button>
        `;
        } else {
          statusClass = "completed";
          moveButtons = `
          <button class="task-btn task-btn-to-active" onclick="changeStatus(${task.id}, '${STATUS.ACTIVE}')">📋 未完了へ</button>
          <button class="task-btn task-btn-to-pending" onclick="changeStatus(${task.id}, '${STATUS.PENDING}')">⏳ 確認中へ</button>
        `;
        }

        // 期限が設定されていればバッジを表示（期限切れ・今日が期限のときは警告色）
        let dueDateHTML = "";
        if (task.dueDate) {
          const dueClass = getDueClass(task);
          let prefix = "📅 期限: ";
          if (dueClass === "overdue") prefix = "⚠️ 期限切れ: ";
          else if (dueClass === "due-today") prefix = "🔔 今日まで: ";
          dueDateHTML = `<div><span class="due-date ${dueClass}">${prefix}${formatDateJP(
            task.dueDate
          )}</span></div>`;
        }

        return `
        <div class="task-item ${statusClass}" draggable="true" data-task-id="${
          task.id
        }" data-status="${task.status}">
          <div class="task-header">
            <span class="drag-handle">⋮⋮</span>
            <div class="task-title">${escapedTitle}</div>
          </div>
          ${
            escapedContent
              ? `<div class="task-content">${escapedContent}</div>`
              : ""
          }
          ${dueDateHTML}
          <div class="task-actions">
            ${moveButtons}
            <button class="task-btn task-btn-edit" onclick="openEditModal(${
              task.id
            })">✏️ 編集</button>
            <button class="task-btn task-btn-delete" onclick="deleteTask(${
              task.id
            })">🗑️ 削除</button>
          </div>
        </div>
      `;
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      document
        .getElementById("editModal")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeModal();
          }
        });
    </script>
  </body>
</html>
